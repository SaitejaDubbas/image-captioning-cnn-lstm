version: "3.9"

services:
  api:
    build: .
    image: image-captioning-api:latest
    container_name: caption-api
    ports:
      - "5000:5000"
    volumes:
      - ./models:/app/models:ro
      - ./data/processed:/app/data/processed:ro
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
